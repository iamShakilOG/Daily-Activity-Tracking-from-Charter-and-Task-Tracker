name: Resource Daily Activity Report

on:
  schedule:
    # Bangladesh time (Asia/Dhaka, GMT+6):
    # 10:00, 15:00, 23:00
    # GitHub Actions cron uses UTC.
    - cron: "0 4 * * *"
    - cron: "0 9 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: resource-daily-activity-report
  cancel-in-progress: false

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      AUDIT_SHEET_URL: ${{ secrets.AUDIT_SHEET_URL }}
      LOCAL_RESOURCE_POOL_URL: ${{ secrets.LOCAL_RESOURCE_POOL_URL }}
      PROJECT_NAME_FILTER: ${{ secrets.PROJECT_NAME_FILTER }}
      HIGHLIGHT_TRACKER_ERRORS: ${{ secrets.HIGHLIGHT_TRACKER_ERRORS }}
      RESOURCE_LOOKUP_TAB: ${{ secrets.RESOURCE_LOOKUP_TAB }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run resource daily activity report
        run: python resource_daily_activity_and_task_report.py
